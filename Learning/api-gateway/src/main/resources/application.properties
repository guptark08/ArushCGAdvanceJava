server.port=6601
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:6600/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.routes[0].id=passenger-service
spring.cloud.gateway.routes[0].uri=lb://passenger-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/passengerdetails/**

spring.cloud.gateway.routes[1].id=passenger-rentalcar-get
spring.cloud.gateway.routes[1].uri=lb://passenger-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/rentalcardetails/**
spring.cloud.gateway.routes[1].predicates[1]=Method=GET

spring.cloud.gateway.routes[2].id=carrentals-rentalcar-write
spring.cloud.gateway.routes[2].uri=lb://carrentals-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/rentalcardetails/**
spring.cloud.gateway.routes[2].predicates[1]=Method=POST,PUT,DELETE

spring.cloud.gateway.routes[3].id=carrentals-booking
spring.cloud.gateway.routes[3].uri=lb://carrentals-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/bookingdetails/**

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always